name: Update Stock

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node index.js

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clean untracked files
        run: |
          git clean -fd
          git reset --hard

      - name: Pull latest changes
        run: git pull --rebase

      - name: Commit and push if stock.json changed
        run: |
          git add stock.json
          git commit -m "🤖 Auto-update stock.json" || echo "No changes to commit"
          git push
